<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Aero mark — play triangle, matching the app icon, in the site teal palette -->
  <defs>
    <radialGradient id="tile" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#15282e"/>
      <stop offset="100%" stop-color="#070d10"/>
    </radialGradient>
    <linearGradient id="tri" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22cfe2"/>
      <stop offset="100%" stop-color="#0b93a6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#tile)"/>
  <!-- soft glow behind the triangle -->
  <polygon points="36,24 36,76 80,50" fill="#0fb5c9" opacity="0.28"/>
  <!-- the mark -->
  <polygon points="39,29 39,71 75,50" fill="url(#tri)" stroke="#2bd6e8" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
